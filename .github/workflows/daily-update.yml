name: Daily Typewriter Update

on:
  schedule:
    # 7 AM EDT (UTC-4) = 11:00 UTC  ← summer
    # Change to 12:00 UTC in winter  (EST = UTC-5)
    - cron: "0 11 * * *"
  workflow_dispatch: {}   # lets you trigger manually from GitHub's UI

jobs:
  update:
    runs-on: ubuntu-latest

    permissions:
      contents: write   # needed so the bot can push the updated index.html

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install \
            google-auth \
            google-auth-oauthlib \
            google-api-python-client \
            requests \
            beautifulsoup4

      - name: Run update script
        env:
          GOOGLE_CLIENT_ID:       ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET:   ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN:   ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          NOTION_TOKEN:           ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID:     ${{ secrets.NOTION_DATABASE_ID }}
          WORK_CALENDAR_IDS:      ${{ secrets.WORK_CALENDAR_IDS }}
          PERSONAL_CALENDAR_IDS:  ${{ secrets.PERSONAL_CALENDAR_IDS }}
          TIMEZONE_OFFSET:        "-4"    # EDT; change to -5 in winter
        run: python update_html.py

      - name: Commit & push updated index.html
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          # Only commit if something actually changed
          git diff --cached --quiet \
            && echo "Nothing changed today." \
            || git commit -m "chore: daily update $(date -u +'%Y-%m-%d')"
          git push
